<!doctype html>
<html lang="en">
  <head>
    <script>
      // Prevent Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var proto = Object.getPrototypeOf(window);
            if (proto) {
              Object.defineProperty(proto, 'fetch', {
                get: function() {
                  return window.fetch;
                },
                set: function(val) {
                  // No-op or custom assign
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (err) {
            console.warn("Sandbox fetch patch failed:", err);
          }
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
